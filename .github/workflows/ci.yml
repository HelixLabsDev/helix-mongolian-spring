name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CONTRACT_PACKAGES: bridge-poc helix-mock-bridge helix-oracle-adaptor helix-token helix-vault bridge-handler

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM (needed for contract imports in tests)
        run: cargo build --target wasm32v1-none --release

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli || true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Optimized WASM
        run: |
          for pkg in $CONTRACT_PACKAGES; do
            stellar contract build --package "$pkg" --optimize
          done

      - name: Check WASM sizes
        run: |
          echo "=== WASM Sizes ==="
          for wasm in target/wasm32v1-none/release/*.wasm; do
            if [ -f "$wasm" ]; then
              size=$(wc -c < "$wasm")
              name=$(basename "$wasm")
              echo "  $name: $size bytes"
              if [ "$size" -gt 204800 ]; then
                echo "  WARNING: $name exceeds 200KB"
              fi
            fi
          done
